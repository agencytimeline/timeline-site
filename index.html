<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline | Motion Design</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.08);
      --text: #f2f2f2;
      --muted: rgba(242,242,242,0.42);
      --pink: #d966e0;
      --blue: #2d7fd4;
      --green: #00d48a;
      --nav-h: 72px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--pink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: 0.22s;
    }

    .cursor.hover {
      width: 38px;
      height: 38px;
      background: transparent;
      border: 1.5px solid var(--pink);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2.5rem;
      background: rgba(10,10,10,0.88);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-logo img { height: 100%; }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    .nav-stripe {
      position: fixed;
      top: var(--nav-h);
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--blue), var(--green));
    }

    .hero {
      padding-top: calc(var(--nav-h) + 3px);
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      padding-left: 2.5rem;
      padding-bottom: 5rem;
    }

    .hero-title {
      font-family: 'Syne';
      font-size: clamp(3rem, 9vw, 7.5rem);
      line-height: 0.9;
    }

    .hero-title .t2 { color: var(--pink); }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
      padding: 0 2px 2px;
    }

    .card {
      aspect-ratio: 16/9;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .about {
      padding: 8rem 2.5rem;
      border-top: 1px solid var(--border);
    }

    footer {
      padding: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="nav-stripe"></div>

<nav>
  <a class="nav-logo" href="#">
    <img src="LOGO_TIMELINE_VERTICAL.png" alt="Timeline">
  </a>

  <ul class="nav-links">
    <li><a href="#works">Works</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <h1 class="hero-title">
    <span>Se tem</span><br>
    <span class="t2">movimento,</span><br>
    <span>a gente animou.</span>
  </h1>
</section>

<section id="works">
  <div class="works-grid">
    <div class="card">Projeto</div>
    <div class="card">Projeto</div>
    <div class="card">Projeto</div>
  </div>
</section>

<section class="about" id="about">
  <p>Somos a Timeline Studio...</p>

  <div id="contact">
    <a href="#">Email</a>
  </div>
</section>

<footer>
  <span>© 2026 Timeline</span>
  <img src="LOGO_TIMELINE_VERTICAL.png">
</footer>

<script>
  const cursor = document.getElementById('cursor');

  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
</script>

</body>
</html>
